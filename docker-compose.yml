version: '3.8'

services:
  app:
    build: ./docker/.
    container_name: ${APP_CONTAINER_NAME}
    ports:
      - "${APP_PORT}:9000"
    environment:
      - TZ=${TZ}
    volumes:
      - ./laravel:/var/www/laravel
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravelSkeleton
    command: sh -c "composer install && php artisan octane:start --server=swoole --host=0.0.0.0 --port=9000"

  app-frontend:
    build: ./docker/.
    container_name: ${APP_FRONTEND_CONTAINER_NAME}
    ports:
      - "${APP_FRONTEND_PORT}:9000"
    environment:
      - TZ=${TZ}
    volumes:
      - ./laravel:/var/www/laravel
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravelSkeleton
    command: sh -c "composer install && php artisan serve --host=0.0.0.0 --port=9000"

  queue:
    build: ./docker/.
    container_name: ${QUEUE_CONTAINER_NAME}
    environment:
      - TZ=${TZ}
    volumes:
      - ./laravel:/var/www/laravel
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravelSkeleton
    command: sh -c "php artisan queue:work --queue=${QUEUE_NAMES}"

  scheduler:
    build: ./docker/.
    environment:
      - TZ=${TZ}
    volumes:
      - ./laravel:/var/www/laravel
    command: >
      sh -c "while true;
      do
        php artisan schedule:run --no-interaction;
        sleep 60;
      done"
    depends_on:
      - db
    networks:
      - laravelSkeleton

  db:
    image: mysql:8.0
    container_name: ${DB_CONTAINER_NAME}
    restart: always
    environment: 
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    command: --default-authentication-plugin=caching_sha2_password
    ports:
      - "${DB_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - laravelSkeleton

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a ${REDIS_PASSWORD} PING || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laravelSkeleton

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ${JAEGER_CONTAINER_NAME}
    ports:
      - "${JAEGER_UI_PORT}:16686"
      - "${JAEGER_OTLP_GRPC_PORT}:4317"
      - "${JAEGER_OTLP_HTTP_PORT}:4318"
    environment:
      - TZ=${TZ}
    networks:
      - laravelSkeleton

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ${OTEL_CONTAINER_NAME}
    environment:
      - TZ=${TZ}
    volumes:
      - ./docker/otel-collector:/etc/otel-collector/
    command: ["--config=/etc/otel-collector/config.yaml"]
    depends_on:
      - jaeger
    networks:
      - laravelSkeleton

networks:
  laravelSkeleton:
    driver: bridge
